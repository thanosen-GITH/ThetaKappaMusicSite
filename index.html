<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Theta Kappa Music</title>
  <meta name="description" content="Theta Kappa Music — music, composition, arrangement, and audio engineering.">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #f5e7c8;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(92vw, 1200px);
      text-align: center;
      padding: 48px 20px;
    }

    img {
      width: min(100%, 1100px);
      height: auto;
      display: block;
      margin: 0 auto 32px;
    }

    p {
      font-size: clamp(18px, 2vw, 26px);
      letter-spacing: 0.08em;
      margin: 0;
      color: #d6ad5c;
    }

    .coming {
      margin-top: 18px;
      font-size: clamp(14px, 1.4vw, 18px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
    }
  </style>
</head>
<body>
  <main>
    <img src="logo1.png" alt="Theta Kappa Music logo1">
    <p>Music • Composition • Arrangement • Audio Engineering</p>
    <p class="coming">Website coming soon</p>
  </main>
</body>
</html>
