</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <nav class="identity-nav" aria-label="Primary">
        <a class="emblem-link" href="/" aria-label="Theta Kappa Music home">
          <img src="assets/logo2-cropped-emblem.png" alt="" class="site-emblem" width="320" height="208">
        </a>

      <nav class="section-nav" aria-label="Site sections">

  </header>

  <main id="main">
    <div class="page">
      <p class="eyebrow">Contact</p>
      <h1>Send a message</h1>
      <p class="lead">For projects, recordings, performances, services, or collaborations.</p>

      <form id="contact-form" class="contact-form" action="https://formspree.io/f/REPLACE_WITH_YOUR_ID" method="POST">
        <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

        <label for="name">Name</label>
        <input id="name" name="name" type="text" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text">

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send message</button>
        <div id="form-status" class="form-status" role="status" aria-live="polite"></div>
      </form>

      <p class="note">No email address is displayed publicly. Messages are forwarded to the address configured in the Formspree account.</p>
    </div>
  </main>

  <script src="scripts/main.js" defer></script>
</body>
</html>
